name: Release

on:
  workflow_dispatch:
    inputs:
      publish_curseforge:
        description: "Publish the current project version to CurseForge only"
        type: boolean
        default: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      HANGAR_TOKEN: ${{ secrets.HANGAR_TOKEN }}
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build with Gradle
        run: ./gradlew build
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: FairyChat
          path: build/libs/**.jar
          if-no-files-found: error
          retention-days: 30
      - name: Generating Changelog
        if: startsWith(github.ref, 'refs/tags/')
        uses: ardalanamini/auto-changelog@v4
        id: changelog
      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/libs/**.jar
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
      - name: Publish to Modrinth
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.MODRINTH_TOKEN != '' }}
        continue-on-error: true
        run: ./gradlew modrinth
        env:
          MODRINTH_CHANGELOG: ${{ steps.changelog.outputs.changelog }}
      - name: Publish to Hangar
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.HANGAR_TOKEN != '' }}
        continue-on-error: true
        run: ./gradlew publishAllPublicationsToHangar
        env:
          HANGAR_CHANGELOG: ${{ steps.changelog.outputs.changelog }}
      - name: Publish to CurseForge
        if: ${{ env.CURSEFORGE_TOKEN != '' && (startsWith(github.ref, 'refs/tags/') || inputs.publish_curseforge) }}
        continue-on-error: true
        run: ./gradlew publishToCurseForge
        env:
          CURSEFORGE_CHANGELOG: ${{ steps.changelog.outputs.changelog || 'Manual CurseForge publish.' }}
